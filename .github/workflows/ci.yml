name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      AWS_REGION: us-east-1
      COGNITO_USER_POOL_ID: us-east-1_TestPool
      COGNITO_CLIENT_ID: test-client-id
      STRIPE_SECRET_KEY: sk_test_fake
      SNS_ALERT_TOPIC_ARN: arn:aws:sns:us-east-1:123456789:test-topic
      HEALTHLAKE_ENDPOINT: https://healthlake.test.endpoint
      TRANSCRIBE_BUCKET: test-transcribe-bucket
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov httpx
      - run: python -m pytest tests/ -v --tb=short --co
      - run: python -m pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python docs/security/security_scan.py
